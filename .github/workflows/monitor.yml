name: Ticket Monitor

on:
  # 每 30 秒執行一次 (免費版 GitHub Actions 每小時最多 60 次)
  schedule:
    - cron: '*/30 * * * *'
  
  # 也支援手動觸發
  workflow_dispatch:
    inputs:
      force_notify:
        description: '強制發送通知'
        required: false
        default: 'false'

# 讓並行 workflow 排隊，不要同時跑多個
concurrency:
  group: ticket-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run monitor
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TIXCRAFT_ACTIVITY_URL: ${{ secrets.TIXCRAFT_ACTIVITY_URL }}
        run: |
          python monitor.py
      
      - name: Upload state artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-state
          path: .last_state.json
          retention-days: 1
      
      - name: Download previous state
        id: prev-state
        uses: actions/download-artifact@v4
        with:
          name: monitor-state
          continue-on-error: true
      
      - name: Commit state update
        uses: actions/commit-artifact-and-push@v4
        if: always()
        with:
          commit-message: "Update monitoring state"
          file-pattern: ".last_state.json"
