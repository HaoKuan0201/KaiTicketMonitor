name: Ticket Monitor

on:
  # 每分鐘執行一次
  schedule:
    - cron: '*/1 * * * *'
  
  # 手動觸發
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run monitor
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TIXCRAFT_ACTIVITY_URL: ${{ secrets.TIXCRAFT_ACTIVITY_URL }}
        run: python monitor.py
